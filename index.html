<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iMessage Video Overlay</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="app">

    <!-- ── Left panel: controls ── -->
    <aside id="panel">
      <h1>iMessage Overlay</h1>

      <!-- Background (video or image) -->
      <section class="control-group">
        <label>Background</label>
        <!-- Mode tabs -->
        <div class="bg-type-tabs">
          <label class="bg-tab active" id="bgTabVideo">
            <input type="radio" name="bgType" value="video" checked /> Video
          </label>
          <label class="bg-tab" id="bgTabImage">
            <input type="radio" name="bgType" value="image" /> Image
          </label>
        </div>
        <!-- Video upload -->
        <div id="videoUploadWrap">
          <input type="file" id="videoUpload" accept="video/*" />
        </div>
        <!-- Image upload + Ken Burns + Duration -->
        <div id="imageUploadWrap" class="hidden">
          <input type="file" id="imageUpload" accept="image/*" />
          <label class="toggle-row" style="margin-top:6px;">
            <input type="checkbox" id="kenBurns" />
            Ken Burns Effect
          </label>
          <div id="kenBurnsOptions" class="sub-options hidden">
            <label for="kbZoom">Zoom</label>
            <select id="kbZoom">
              <option value="in">In</option>
              <option value="out">Out</option>
            </select>
            <label for="kbPan">Pan</label>
            <select id="kbPan">
              <option value="none">None</option>
              <option value="right">Right</option>
              <option value="left">Left</option>
              <option value="down">Down</option>
              <option value="up">Up</option>
            </select>
          </div>
          <label class="setting-row-label" for="imageDuration" style="margin-top:6px;">Duration (seconds)</label>
          <input type="number" id="imageDuration" min="1" max="600" step="1" value="30" />
        </div>
        <p class="hint">Auto-cropped to 9:16.</p>
      </section>

      <!-- ⚙ Settings dropdown -->
      <section class="control-group settings-section">
        <button id="settingsToggle" class="settings-toggle">
          <span>⚙ Settings</span>
          <span id="settingsChevron" class="chevron">▼</span>
        </button>
        <div id="settingsBody" class="settings-body hidden">

          <!-- Video -->
          <div class="setting-group">
            <div class="setting-group-title">Video</div>
            <label class="setting-row-label">Black overlay <span id="scrimOpacityValue">0%</span></label>
            <input type="range" id="scrimOpacity" min="0" max="100" value="0" />
            <label class="setting-row-label">Background audio <span id="bgVolumeValue">50%</span></label>
            <input type="range" id="bgVolume" min="0" max="100" value="50" />
          </div>

          <!-- Timing -->
          <div class="setting-group">
            <div class="setting-group-title">Timing</div>
            <label class="setting-row-label" for="initialDelay">Initial delay (seconds)</label>
            <input type="number" id="initialDelay" min="0" max="30" step="0.5" value="0" />
          </div>

          <!-- Header -->
          <div class="setting-group">
            <div class="setting-group-title">Header</div>
            <label class="toggle-row">
              <input type="checkbox" id="showHeader" checked />
              Show status bar &amp; nav bar
            </label>
            <div id="headerOptions" class="sub-options">
              <label for="contactName">Contact name</label>
              <input type="text" id="contactName" placeholder="John" />
              <label for="statusTime">Status bar time</label>
              <input type="text" id="statusTime" placeholder="9:41" maxlength="5" />
              <p class="hint">Leave blank to use current time.</p>
            </div>
          </div>

          <!-- Counterparty -->
          <div class="setting-group">
            <div class="setting-group-title">Counterparty</div>
            <label class="toggle-row">
              <input type="checkbox" id="showCounterparty" />
              Show avatar &amp; name
            </label>
            <div id="counterpartyOptions" class="sub-options hidden">
              <label for="counterpartyInitials">Initials</label>
              <input type="text" id="counterpartyInitials" maxlength="2" placeholder="JD" />
              <label for="counterpartyName">Nickname</label>
              <input type="text" id="counterpartyName" placeholder="John" />
              <label for="counterpartyColor">Avatar color</label>
              <input type="color" id="counterpartyColor" value="#34C759" />
            </div>
          </div>

        </div>
      </section>

      <!-- Conversation script -->
      <section class="control-group">
        <div class="script-label-row">
          <label for="scriptInput">Conversation Script</label>
          <button id="emojiToggle" class="emoji-toggle-btn" title="Insert emoji">😊</button>
        </div>

        <!-- Emoji picker -->
        <div id="emojiPicker" class="emoji-picker hidden">
          <div class="emoji-tabs" id="emojiTabs"></div>
          <div class="emoji-grid" id="emojiGrid"></div>
        </div>

        <textarea id="scriptInput" rows="10" placeholder="A: Hey! [d:2]
B: Hey back! [t:3]
A: How's it going? [d:1]
B: Pretty good! [d:1,t:2]"></textarea>
        <p class="hint">
          <strong>A</strong> = sender (blue, right) &nbsp;·&nbsp;
          <strong>B</strong> = receiver (gray, left)<br />
          <code>[d:2]</code> delay &nbsp;·&nbsp;
          <code>[t:3]</code> typing &nbsp;·&nbsp;
          <code>[d:2,t:3]</code> both<br />
          Legacy: <code>[2s]</code> &nbsp;·&nbsp; <code>[typing:3s]</code>
        </p>
      </section>

      <!-- Actions -->
      <section class="control-group actions">
        <button id="btnPreview" class="btn-primary">▶ Preview</button>
        <button id="btnExport" class="btn-secondary" disabled>⬇ Export MP4</button>
        <button id="btnStop"   class="btn-danger"   hidden>■ Stop</button>
      </section>

      <!-- Export progress -->
      <section id="exportStatus" class="hidden">
        <progress id="exportProgress" value="0" max="100"></progress>
        <span id="exportLabel">Exporting…</span>
      </section>
    </aside>

    <!-- ── Right panel: canvas preview ── -->
    <main id="previewArea">
      <div id="canvasWrap">
        <canvas id="mainCanvas"></canvas>
        <div id="placeholder">
          <span>Upload a background and press Preview</span>
        </div>
      </div>
    </main>

  </div>

  <!-- Hidden video element used as texture source -->
  <video id="sourceVideo" playsinline></video>

  <!-- FFmpeg.wasm — used in recorder.js to transcode WebM → MP4 -->
  <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.12.6/dist/umd/ffmpeg.js"></script>
  <script src="https://unpkg.com/@ffmpeg/util@0.12.1/dist/umd/util.js"></script>

  <script src="js/parser.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/imessage-ui.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/recorder.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
